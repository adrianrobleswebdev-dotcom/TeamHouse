<!-- Hero Section -->
<section class="relative w-full min-h-screen flex items-center justify-center overflow-hidden">

    <!-- Imagen de fondo + overlay -->
    <div class="absolute inset-0 z-0">
        <img src="/assets/hero-teamhouse.png" alt="Villa de lujo con alberca al atardecer"
            class="w-full h-full object-cover object-center" />
        <div class="absolute inset-0 bg-gradient-to-b from-[#0B0E14]/85 via-[#0B0E14]/55 to-[#0B0E14]/30"
            aria-hidden="true"></div>
    </div>

    <!-- Contenido centrado -->
    <div class="relative z-10 flex flex-col items-center text-center px-6 py-8 max-w-[1000px] w-full gap-8">

        <!-- Título -->
        <h1 class="font-heading text-[clamp(2rem,5vw,4.5rem)] font-bold text-white leading-[1.15] tracking-tight ">
            Encuentra tu próximo<br>
            <span class="text-(--th-gold-accent)">hogar con TeamHouse</span>
        </h1>

        <!-- Subtítulo -->
        <p class="font-body text-[clamp(0.875rem,1.5vw,1.25rem)] text-white/80 leading-relaxed ">
            Exclusividad y confianza en cada metro cuadrado.<br>
            Tu visión, nuestra experiencia.
        </p>

        <!-- Barra de búsqueda -->
        <div class="flex flex-col sm:flex-row items-center bg-white/10 backdrop-blur-md border border-white/20 rounded-lg p-1.5 w-full max-w-[680px]  px-[1rem] py-[1rem] "
            role="search">

            <!-- Tabs Venta / Renta -->
            <div class="flex w-full sm:w-auto gap-1 shrink-0 mb-2 sm:mb-0" role="group" aria-label="Tipo de propiedad">
                <button
                    class="flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 whitespace-nowrap"
                    [ngClass]="searchType() === 'venta' ? 'text-white border border-white/60 bg-white/10' : 'text-white/70 border border-transparent hover:text-white hover:border-white/30'"
                    (click)="setSearchType('venta')" [attr.aria-pressed]="searchType() === 'venta'">
                    Venta
                </button>
                <button
                    class="flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 whitespace-nowrap"
                    [ngClass]="searchType() === 'renta' ? 'text-white border border-white/60 bg-white/10' : 'text-white/70 border border-transparent hover:text-white hover:border-white/30'"
                    (click)="setSearchType('renta')" [attr.aria-pressed]="searchType() === 'renta'">
                    Renta
                </button>
            </div>

            <!-- Input de ubicación -->
            <label for="search-location" class="sr-only">Ubicación, ciudad o zona</label>
            <div class="flex items-center flex-1 w-full gap-2 px-3 py-1 sm:py-0">
                <svg class="w-[1.125rem] h-[1.125rem] text-white/50 shrink-0" aria-hidden="true" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <input id="search-location" type="text"
                    class="flex-1 bg-transparent border-none outline-none text-white text-[0.9rem] font-body placeholder:text-white/45 "
                    placeholder="Ubicación, ciudad o zona..." [value]="searchQuery()"
                    (input)="searchQuery.set($any($event.target).value)" (keydown.enter)="onSearch()" />
            </div>

            <!-- Botón buscar -->
            <button
                class="flex items-center justify-center gap-2 px-5 py-2.5 mt-2 sm:mt-0 w-full sm:w-auto bg-(--th-gold-accent) hover:bg-(--th-gold-hover) hover:cursor-pointer  text-[#0B0E14] text-xs font-bold tracking-[0.08em] rounded-md transition-colors duration-200 shrink-0"
                (click)="onSearch()" aria-label="Buscar propiedades">
                <svg class="w-4 h-4" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                BUSCAR
            </button>

        </div>
    </div>

</section>

<!-- Featured Properties Section -->
<app-featured-properties></app-featured-properties>

<!-- Google Reviews Section -->
<app-google-reviews></app-google-reviews>
